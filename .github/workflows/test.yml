# CI/CD Pipeline for prompt-injection-testing
# Unit tests run locally, E2E tests run in Docker

name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Unit tests - run locally (no Docker required)
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pytest httpx
      
      - name: Run unit tests
        run: |
          python -m pytest test_generator.py -v --tb=short
      
      - name: Run integration tests
        run: |
          python -m pytest test_detection.py -v --tb=short

  # E2E tests - run in Docker only
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: docker-compose build
      
      - name: Run E2E tests in Docker
        run: |
          docker-compose -f docker-compose.test.yml up --abort-on-container-exit
        env:
          SERVICE_URL: http://localhost:8081
      
      - name: Cleanup
        if: always()
        run: docker-compose -f docker-compose.test.yml down

  # Code quality checks
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install ruff
      
      - name: Run linter
        run: |
          ruff check .

  # Security audit
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install safety
      
      - name: Run security audit
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          safety check || true
